name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate versions
        run: |
          TAG="${GITHUB_REF_NAME}"
          MANIFEST=$(node -p "require('./manifest.json').version")
          PACKAGE=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "Tag ($TAG) does not match manifest.json version ($MANIFEST)"
            exit 1
          fi
          if [ "$TAG" != "$PACKAGE" ]; then
            echo "Tag ($TAG) does not match package.json version ($PACKAGE)"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/main.js
            manifest.json
